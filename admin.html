<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛毛宠物 - 管理后台</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<header>
  <div class="container">
    <div class="logo">🐾 毛毛<span>宠物</span> <span style="font-size:14px;font-weight:400;margin-left:12px;opacity:0.7;">管理后台</span></div>
    <nav>
      <a href="index.html">← 返回前台</a>
    </nav>
  </div>
</header>

<!-- Admin Login -->
<section id="adminLoginSection">
  <div class="container">
    <div class="admin-login-box">
      <h2>🔐 管理员登录</h2>
      <form onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label>管理员账号</label>
          <input type="text" id="adminUser" value="adim" readonly style="background:#f5f5f5;">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="adminPass" placeholder="请输入密码" required autofocus>
        </div>
        <div class="auth-error" id="adminLoginError"></div>
        <button type="submit" class="submit-btn">登录</button>
      </form>
    </div>
  </div>
</section>

<!-- Admin Panel -->
<section id="adminPanelSection" style="display:none;">
  <div class="container">
    <div class="admin-panel">
      <div class="admin-panel-header">
        <h2>⚙ 管理后台</h2>
        <button class="admin-logout-btn" onclick="adminLogout()">退出管理</button>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchAdminTab('users', this)">👥 用户管理</button>
        <button class="admin-tab" onclick="switchAdminTab('orders', this)">📦 订单管理</button>
      </div>

      <div id="adminUsersPanel">
        <div class="user-search-bar">
          <input type="text" id="adminUserSearch" placeholder="搜索用户名..." oninput="handleAdminUserSearch()">
          <button class="submit-btn" style="width:auto;padding:10px 20px;" onclick="handleAdminUserSearch()">搜索</button>
          <button class="submit-btn" style="width:auto;padding:10px 20px;background:#27ae60;" onclick="downloadUsersCSV()">导出 CSV</button>
        </div>
        <div id="adminUserResult"></div>
      </div>

      <div id="adminOrdersPanel" style="display:none;">
        <div class="user-search-bar">
          <input type="text" id="adminOrderSearch" placeholder="搜索用户名或商品..." oninput="handleAdminOrderSearch()">
          <button class="submit-btn" style="width:auto;padding:10px 20px;" onclick="handleAdminOrderSearch()">搜索</button>
        </div>
        <div id="adminOrderResult"></div>
      </div>
    </div>
  </div>
</section>

<script src="admin.js"></script>
</body>
</html>
